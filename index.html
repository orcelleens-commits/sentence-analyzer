<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Sentence Analyzer</title>
</head>

<body class="bg-gray-950 text-white flex items-center justify-center min-h-screen">

  <div class="w-full max-w-xl p-6 bg-gray-900 rounded-2xl shadow-xl space-y-6">

    <h1 class="text-2xl font-bold text-center">
      Sentence Analyzer
    </h1>

    <textarea id="inputText"
      class="w-full h-32 p-3 rounded-lg bg-gray-800 text-white border border-gray-700"
      placeholder="Type a sentence..."></textarea>

    <button onclick="analyzeText()"
      class="w-full bg-blue-600 hover:bg-blue-700 transition p-3 rounded-lg font-semibold">
      Analyze
    </button>

    <div class="grid grid-cols-2 gap-4 text-center">

      <div class="bg-gray-800 p-4 rounded-lg">
        <p class="text-sm text-gray-400">Vowels</p>
        <p id="vowels" class="text-xl font-bold">0</p>
      </div>

      <div class="bg-gray-800 p-4 rounded-lg">
        <p class="text-sm text-gray-400">Consonants</p>
        <p id="consonants" class="text-xl font-bold">0</p>
      </div>

      <div class="bg-gray-800 p-4 rounded-lg">
        <p class="text-sm text-gray-400">Punctuation</p>
        <p id="punctuation" class="text-xl font-bold">0</p>
      </div>

      <div class="bg-gray-800 p-4 rounded-lg">
        <p class="text-sm text-gray-400">Words</p>
        <p id="words" class="text-xl font-bold">0</p>
      </div>

    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
